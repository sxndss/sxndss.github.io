        // ========== 版本历史 ==========
        function viewHistory(id, type) {
            let item = null;
            let name = '';
            if (type === 'note') {
                item = appData.notes.find(n => n.id === id);
                name = item ? item.title : '笔记';
            } else if (type === 'error') {
                item = appData.errors.find(e => e.id === id);
                name = item ? item.title : '错题';
            }
            if (!item || !item.history || item.history.length === 0) {
                showToast('暂无历史版本', 'info');
                return;
            }

            let html = `<div style="font-size:13px;color:var(--gray-500);margin-bottom:12px;">「${name}」的历史版本（共${item.history.length}个）</div><div class="version-list">`;
            const versions = [...item.history].reverse();
            for (const v of versions) {
                const preview = v.title || v.question || v.content || '无内容';
                html += `
                    <div class="version-item">
                        <div>
                            <div class="preview">${escapeHtml(preview.substring(0, 60))}${preview.length > 60 ? '...' : ''}</div>
                            <div class="time">${formatDate(v.timestamp)}</div>
                        </div>
                        <button class="btn-restore" onclick="restoreVersion('${id}','${type}',${versions.indexOf(v)})">恢复此版本</button>
                    </div>
                `;
            }
            html += '</div>';

            showModal('🕐 版本历史', html, [
                { text: '关闭', class: '', action: 'close' }
            ]);
        }

        function restoreVersion(id, type, index) {
            let item = null;
            if (type === 'note') {
                item = appData.notes.find(n => n.id === id);
            } else if (type === 'error') {
                item = appData.errors.find(e => e.id === id);
            }
            if (!item || !item.history) return;

            const versions = [...item.history].reverse();
            const v = versions[index];
            if (!v) return;

            if (!confirm('确定要恢复到该版本吗？当前内容将被覆盖。')) return;

            if (type === 'note') {
                item.title = v.title || item.title;
                item.content = v.content || item.content;
                item.tags = v.tags || item.tags || [];
                item.color = v.color || item.color;
            } else if (type === 'error') {
                item.question = v.question || item.question;
                item.solution = v.solution || item.solution;
                item.reason = v.reason || item.reason;
                item.tags = v.tags || item.tags || [];
                item.color = v.color || item.color;
            }
            item.updatedAt = Date.now();
            saveData();
            closeModal();
            showToast('✅ 已恢复到所选版本');
            renderAll();
        }

        function batchAddTag() {
            if (batchSelected.size === 0) { showToast('请先选择项目', 'warning'); return; }
            const tag = prompt('请输入要添加的标签：');
            if (!tag) return;
            const trimmed = tag.trim();
            if (!trimmed) return;
            let count = 0;
            // 处理笔记
            for (const id of batchSelected) {
                const note = appData.notes.find(n => n.id === id);
                if (note) {
                    if (!note.tags) note.tags = [];
                    if (!note.tags.includes(trimmed)) { note.tags.push(trimmed);
                        count++; }
                }
                const error = appData.errors.find(e => e.id === id);
                if (error) {
                    if (!error.tags) error.tags = [];
                    if (!error.tags.includes(trimmed)) { error.tags.push(trimmed);
                        count++; }
                }
            }
            saveData();
            showToast(`✅ 为 ${count} 项添加了标签「${trimmed}」`);
            renderAll();
        }

        function batchRemoveTag() {
            if (batchSelected.size === 0) { showToast('请先选择项目', 'warning'); return; }
            const tag = prompt('请输入要移除的标签：');
            if (!tag) return;
            const trimmed = tag.trim();
            if (!trimmed) return;
            let count = 0;
            for (const id of batchSelected) {
                const note = appData.notes.find(n => n.id === id);
                if (note && note.tags) {
                    const idx = note.tags.indexOf(trimmed);
                    if (idx !== -1) { note.tags.splice(idx, 1);
                        count++; }
                }
                const error = appData.errors.find(e => e.id === id);
                if (error && error.tags) {
                    const idx = error.tags.indexOf(trimmed);
                    if (idx !== -1) { error.tags.splice(idx, 1);
                        count++; }
                }
            }
            saveData();
            showToast(`✅ 从 ${count} 项中移除了标签「${trimmed}」`);
            renderAll();
        }

            const colorMap = { red: '🔴 红色', orange: '🟠 橙色', yellow: '🟡 黄色', green: '🟢 绿色', blue: '🔵 蓝色',

                if (appData.queue.some(q => q.id === id)) continue;

        function batchDelete() {
            if (batchSelected.size === 0) { showToast('请先选择项目', 'warning'); return; }
            if (!confirm(`确定要将选中的 ${batchSelected.size} 项移入回收站吗？`)) return;
            let count = 0;
            for (const id of batchSelected) {
                let item = appData.notes.find(n => n.id === id);
                let type = 'note';
                if (!item) {
                    item = appData.errors.find(e => e.id === id);
                    type = 'error';
                }
                if (!item) {
                    item = appData.words.find(w => w.id === id);
                    type = 'word';
                }
                if (item) {
                    appData.recycleBin.push({
                        id: item.id,
                        type: type,
                        data: JSON.parse(JSON.stringify(item)),
                        deletedAt: Date.now()
                    });
                    if (type === 'note') appData.notes = appData.notes.filter(n => n.id !== id);
                    else if (type === 'error') appData.errors = appData.errors.filter(e => e.id !== id);
                    else if (type === 'word') appData.words = appData.words.filter(w => w.id !== id);
                    appData.starred = appData.starred.filter(s => s !== id);
                    appData.queue = appData.queue.filter(q => q.id !== id);
                    count++;
                }
            }
            saveData();
            batchSelected.clear();
            batchMode = false;
            document.getElementById('btnBatchMode').textContent = '☑️ 批量操作';
            document.getElementById('batchActions').style.display = 'none';
            showToast(`✅ ${count} 项已移入回收站`);
            renderAll();
        }

        // ========== 搜索 ==========
        function performSearch(query) {
            if (!query || query.length < 1) {
                renderCurrentView();
                return;
            }
            const q = query.toLowerCase().trim();
            const results = [];

            // 搜索笔记
            for (const note of appData.notes) {
                const match = note.title.toLowerCase().includes(q) ||
                    (note.content || '').toLowerCase().includes(q) ||
                    (note.tags || []).some(t => t.toLowerCase().includes(q));
                if (match) {
                    results.push({ ...note, _type: 'note', _score: 1 });
                }
            }

            // 搜索错题
            for (const error of appData.errors) {
                const match = (error.question || '').toLowerCase().includes(q) ||
                    (error.solution || '').toLowerCase().includes(q) ||
                    (error.reason || '').toLowerCase().includes(q) ||
                    (error.tags || []).some(t => t.toLowerCase().includes(q));
                if (match) {
                    results.push({ ...error, _type: 'error', _score: 1 });
                }
            }

            // 搜索规范词
            for (const word of appData.words) {
                const match = (word.from || '').toLowerCase().includes(q) ||
                    (word.to || '').toLowerCase().includes(q) ||
                    (word.theme || '').toLowerCase().includes(q);
                if (match) {
                    results.push({ ...word, _type: 'word', _score: 1 });
                }
            }

            // 按类型分组显示
            const container = document.getElementById('contentList');
            if (results.length === 0) {
                container.innerHTML =
                `<div class="empty-state"><div class="icon">🔍</div><p>未找到与「${escapeHtml(query)}」相关的内容</p></div>`;
                return;
            }

            let html = `<div style="margin-bottom:12px;font-size:13px;color:var(--gray-500);">🔍 找到 ${results.length} 条结果</div>`;
            const noteResults = results.filter(r => r._type === 'note');
            const errorResults = results.filter(r => r._type === 'error');
            const wordResults = results.filter(r => r._type === 'word');

            if (noteResults.length > 0) {
                html += `<div style="font-weight:600;font-size:14px;color:var(--gray-700);margin:8px 0 4px;">📝 笔记 (${noteResults.length})</div>`;
                for (const r of noteResults) {
                    html += renderNoteCard(r);
                }
            }
            if (errorResults.length > 0) {
                html += `<div style="font-weight:600;font-size:14px;color:var(--gray-700);margin:8px 0 4px;">❌ 错题 (${errorResults.length})</div>`;
                for (const r of errorResults) {
                    html += renderErrorCard(r);
                }
            }
            if (wordResults.length > 0) {
                html += `<div style="font-weight:600;font-size:14px;color:var(--gray-700);margin:8px 0 4px;">📖 规范词 (${wordResults.length})</div>`;
                for (const r of wordResults) {
                    html += renderWordCard(r);
                }
            }
            container.innerHTML = html;

            // 高亮关键词（简单实现：用黄色背景）
            container.querySelectorAll('.card-body, .card-title').forEach(el => {
                const text = el.textContent;
                if (text.toLowerCase().includes(q)) {
                    // 不破坏DOM结构，仅标记
                }
            });
        }

        // ========== 导入导出 ==========
        function exportData() {
            const json = JSON.stringify(appData, null, 2);
            // 下载JSON
            const blob = new Blob([json], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `公考备考数据_${new Date().toISOString().slice(0,10)}.json`;
            a.click();
            URL.revokeObjectURL(url);
            showToast('✅ 数据已导出');
        }

        function importData() {
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = '.json';
            input.onchange = function(e) {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = function(ev) {
                    try {
                        const data = JSON.parse(ev.target.result);
                        if (confirm('导入将覆盖当前所有数据，确认继续吗？')) {
                            appData = data;
                            saveData();
                            showToast('✅ 数据导入成功');
                            renderAll();
                        }
                    } catch (err) {
                        showToast('❌ 导入失败：文件格式错误', 'error');
                    }
                };
                reader.readAsText(file);
            };
            input.click();
        }

        // ========== 弹窗管理 ==========
        function showModal(title, bodyHtml, footerBtns) {
            document.getElementById('modalTitle').textContent = title;
            document.getElementById('modalBody').innerHTML = bodyHtml;
            let footerHtml = '';
            for (const btn of footerBtns) {
                footerHtml +=
                    `<button class="btn ${btn.class}" onclick="${btn.action}()">${btn.text}</button>`;
            }
            document.getElementById('modalFooter').innerHTML = footerHtml;
            document.getElementById('modalOverlay').classList.remove('hidden');
        }

        function closeModal() {
            document.getElementById('modalOverlay').classList.add('hidden');
            editingId = null;
            editingType = null;
        }

        // 点击外部关闭
        document.getElementById('modalOverlay').addEventListener('click', function(e) {
            if (e.target === this) closeModal();
        });

        // ========== 工具函数 ==========
        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // ========== 启动应用 ==========
        document.addEventListener('DOMContentLoaded', init);

        // 暴露全局函数供HTML调用
        window.selectNode = selectNode;
        window.toggleNode = toggleNode;
        window.expandAll = expandAll;
        window.collapseAll = collapseAll;
        window.handleNew = handleNew;
        window.showNewNoteModal = showNewNoteModal;
        window.showNewErrorModal = showNewErrorModal;
        window.showNewWordModal = showNewWordModal;
        window.saveNote = saveNote;
        window.saveError = saveError;
        window.saveWord = saveWord;
        window.updateNoteTemplateFields = updateNoteTemplateFields;
        window.updateEditNoteTemplateFields = updateEditNoteTemplateFields;
        window.selectColor = selectColor;
        window.editItem = editItem;
        window.saveEditNote = saveEditNote;
        window.saveEditError = saveEditError;
        window.saveEditWord = saveEditWord;
        window.deleteItem = deleteItem;
        window.showRecycleBin = showRecycleBin;
        window.restoreFromRecycle = restoreFromRecycle;
        window.permanentDelete = permanentDelete;
        window.emptyRecycleBin = emptyRecycleBin;
        window.toggleStar = toggleStar;
        window.togglePin = togglePin;
        window.addToQueue = addToQueue;
        window.markQueueDone = markQueueDone;
        window.markQueueFail = markQueueFail;
        window.revealAnswer = revealAnswer;
        window.markMastered = markMastered;
        window.unmasterError = unmasterError;
        window.viewHistory = viewHistory;
        window.restoreVersion = restoreVersion;
        window.toggleBatchMode = toggleBatchMode;
        window.toggleBatchSelect = toggleBatchSelect;
        window.batchAddTag = batchAddTag;
        window.batchRemoveTag = batchRemoveTag;
        window.batchSetColor = batchSetColor;
        window.batchAddQueue = batchAddQueue;
        window.batchDelete = batchDelete;
        window.exportData = exportData;
        window.importData = importData;
        window.closeModal = closeModal;
        window.renderCurrentView = renderCurrentView;
        window.renderAll = renderAll;
        window.showToast = showToast;

        // 卡片点击批量选择
        document.addEventListener('click', function(e) {
            const card = e.target.closest('.card');
            if (card && batchMode) {
                const id = card.dataset.id;
                if (id) {
                    toggleBatchSelect(id);
                }
            }
        });
    </script>
</body>
