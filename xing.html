                { text: '取消', class: '', action: 'close' },
                { text: '保存', class: 'btn-primary', action: 'saveWord' }
            ]);
        }

        function saveWord() {
            const from = document.getElementById('wordFrom').value.trim();
            const to = document.getElementById('wordTo').value.trim();
            if (!to) {
                showToast('请输入规范词', 'warning');
                return;
            }
            const theme = document.getElementById('wordTheme').value;
            const note = document.getElementById('wordNote').value.trim();

            const word = {
                id: genId(),
                nodeId: selectedNodeId,
                from: from,
                to: to,
                theme: theme,
                note: note,
                title: to,
                createdAt: Date.now(),
                updatedAt: Date.now(),
                // 复习相关
                reviewCount: 0,
                remembered: false,
                skipNext: false,
                intervalIndex: 0,
                nextReviewDate: new Date(Date.now() + 24 * 60 * 60 * 1000).toISOString()
            };

            appData.words.push(word);
            saveData();
            closeModal();
            showToast('✅ 规范词已保存，已加入复习队列（1天后首次复习）');
            generateDailyReview();
            renderAll();
        }

        // ========== 编辑 ==========
        function editItem(id, type) {
            if (type === 'note') {
                const item = appData.notes.find(n => n.id === id);
                if (!item) return;
                editingId = id;
                editingType = 'note';

                const template = getTemplateById(item.templateId);
                let contentData = {};
                try { contentData = JSON.parse(item.content || '{}'); } catch (e) {}

                let templateOptions = '';
                for (const t of TEMPLATES) {
                    templateOptions += `<option value="${t.id}" ${t.id === item.templateId ? 'selected' : ''}>${t.name}</option>`;
                }

                let fieldsHtml = '';
                if (template) {
                    for (const field of template.fields) {
                        const val = contentData[field] || '';
                        fieldsHtml += `
                            <div class="tf-row">
                                <span class="tf-label">${field}</span>
                                ${field === '备注' ? 
                                    `<textarea class="tf-input" data-field="${field}" rows="2">${escapeHtml(val)}</textarea>` :
                                    `<input class="tf-input" data-field="${field}" value="${escapeHtml(val)}" />`
                                }
                            </div>
                        `;
                    }
                }

                const html = `
                    <div class="form-group">
                        <label>标题</label>
                        <input type="text" id="editNoteTitle" value="${escapeHtml(item.title)}" />
                    </div>
                    <div class="form-group">
                        <label>模板</label>
                        <select id="editNoteTemplate" onchange="updateEditNoteTemplateFields()">
                            ${templateOptions}
                        </select>
                    </div>
                    <div class="form-group">
                        <label>内容</label>
                        <div class="template-fields" id="editNoteTemplateFields">
                            ${fieldsHtml}
                        </div>
                    </div>
                    <div class="form-group">
                        <label>标签</label>
                        <input type="text" id="editNoteTags" value="${(item.tags || []).join(',')}" />
                    </div>
                `;

                showModal('编辑笔记', html, [
                    { text: '取消', class: '', action: 'close' },
                    { text: '保存', class: 'btn-primary', action: 'saveEditNote' }
                ]);

            } else if (type === 'error') {
                const item = appData.errors.find(e => e.id === id);
                if (!item) return;
                editingId = id;
                editingType = 'error';

                const html = `
                    <div class="form-group">
                        <label>题干</label>
                        <textarea id="editErrorQuestion" rows="3">${escapeHtml(item.question)}</textarea>
                    </div>
                    <div class="form-group">
                        <label>错误原因</label>
                        <select id="editErrorReason">
                            <option value="看错主体" ${item.reason === '看错主体' ? 'selected' : ''}>看错主体</option>
                            <option value="看错时间" ${item.reason === '看错时间' ? 'selected' : ''}>看错时间</option>
                            <option value="计算失误" ${item.reason === '计算失误' ? 'selected' : ''}>计算失误</option>
                            <option value="知识点盲区" ${item.reason === '知识点盲区' ? 'selected' : ''}>知识点盲区</option>
                            <option value="掉入陷阱" ${item.reason === '掉入陷阱' ? 'selected' : ''}>掉入陷阱</option>
                            <option value="其他" ${item.reason === '其他' ? 'selected' : ''}>其他</option>
                        </select>
                        <input type="text" id="editErrorReasonCustom" value="${!['看错主体','看错时间','计算失误','知识点盲区','掉入陷阱','其他'].includes(item.reason) ? item.reason : ''}" placeholder="或自定义原因" style="margin-top:4px;" />
                    </div>
                    <div class="form-group">
                        <label>正确思路</label>
                        <textarea id="editErrorSolution" rows="4">${escapeHtml(item.solution)}</textarea>
                    </div>
                    <div class="form-group">
                        <label>标签</label>
                        <input type="text" id="editErrorTags" value="${(item.tags || []).join(',')}" />
                    </div>
                    <div class="form-group">
                        <label>已掌握状态</label>
                        <select id="editErrorMastered">
                            <option value="false" ${!item.mastered ? 'selected' : ''}>未掌握</option>
                            <option value="true" ${item.mastered ? 'selected' : ''}>已掌握</option>
                        </select>
                    </div>
                `;

                showModal('编辑错题', html, [
                    { text: '取消', class: '', action: 'close' },
                    { text: '保存', class: 'btn-primary', action: 'saveEditError' }
                ]);

            } else if (type === 'word') {
                const item = appData.words.find(w => w.id === id);
                if (!item) return;
                editingId = id;
                editingType = 'word';
                const themes = ['经济建设', '民生保障', '生态环保', '基层治理', '文化建设', '科技创新', '其他'];
                const themeOptions = themes.map(t =>
                    `<option value="${t}" ${t === item.theme ? 'selected' : ''}>${t}</option>`).join('');

                const html = `
                    <div class="form-group">
                        <label>大白话表述</label>
                        <textarea id="editWordFrom" rows="2">${escapeHtml(item.from)}</textarea>
                    </div>
                    <div class="form-group">
                        <label>申论规范词</label>
                        <input type="text" id="editWordTo" value="${escapeHtml(item.to)}" />
                    </div>
                    <div class="form-group">
                        <label>主题分类</label>
                        <select id="editWordTheme">${themeOptions}</select>
                    </div>
                    <div class="form-group">
                        <label>备注</label>
                        <input type="text" id="editWordNote" value="${escapeHtml(item.note)}" />
                    </div>
                `;

                showModal('编辑规范词', html, [
                    { text: '取消', class: '', action: 'close' },
                    { text: '保存', class: 'btn-primary', action: 'saveEditWord' }
                ]);
            }
        }

        function updateEditNoteTemplateFields() {
            const select = document.getElementById('editNoteTemplate');
            const container = document.getElementById('editNoteTemplateFields');
            const templateId = select.value;
            const template = getTemplateById(templateId);
            if (!template) {
                container.innerHTML = '';
                return;
            }
            const existing = {};
            container.querySelectorAll('.tf-input').forEach(el => {
                existing[el.dataset.field] = el.value;
            });
            let html = '';
            for (const field of template.fields) {
                const val = existing[field] || '';
                html += `
                    <div class="tf-row">
                        <span class="tf-label">${field}</span>
                        ${field === '备注' ? 
                            `<textarea class="tf-input" data-field="${field}" rows="2">${escapeHtml(val)}</textarea>` :
                            `<input class="tf-input" data-field="${field}" value="${escapeHtml(val)}" />`
                        }
                    </div>
                `;
            }
            container.innerHTML = html;
        }

        function saveEditNote() {
            const id = editingId;
            const item = appData.notes.find(n => n.id === id);
            if (!item) return;

            const title = document.getElementById('editNoteTitle').value.trim();
            if (!title) { showToast('请输入标题', 'warning'); return; }

            const templateId = document.getElementById('editNoteTemplate').value;
            const content = {};
            document.querySelectorAll('#editNoteTemplateFields .tf-input').forEach(el => {
                content[el.dataset.field] = el.value.trim();
            });
            const tags = document.getElementById('editNoteTags').value.split(',').map(s => s.trim()).filter(Boolean);

            item.title = title;
            item.content = JSON.stringify(content);
            item.templateId = templateId;
            item.tags = tags;
            item.updatedAt = Date.now();

            saveData();
            closeModal();
            showToast('✅ 笔记已更新');
            renderAll();
        }

        function saveEditError() {
            const id = editingId;
            const item = appData.errors.find(e => e.id === id);
            if (!item) return;

            const question = document.getElementById('editErrorQuestion').value.trim();
            if (!question) { showToast('请输入题干', 'warning'); return; }
            const reason = document.getElementById('editErrorReason').value;
            const reasonCustom = document.getElementById('editErrorReasonCustom').value.trim();
            const finalReason = reasonCustom || reason;
            const solution = document.getElementById('editErrorSolution').value.trim();
            if (!solution) { showToast('请输入正确思路', 'warning'); return; }
            const tags = document.getElementById('editErrorTags').value.split(',').map(s => s.trim()).filter(Boolean);
            const mastered = document.getElementById('editErrorMastered').value === 'true';

            item.question = question;
            item.title = question.substring(0, 50) + (question.length > 50 ? '...' : '');
            item.reason = finalReason;
            item.solution = solution;
            item.tags = tags;
            item.mastered = mastered;
            item.updatedAt = Date.now();

            saveData();
            closeModal();
            showToast('✅ 错题已更新');
            renderAll();
        }

        function saveEditWord() {
            const id = editingId;
            const item = appData.words.find(w => w.id === id);
            if (!item) return;

            const from = document.getElementById('editWordFrom').value.trim();
            const to = document.getElementById('editWordTo').value.trim();
            if (!to) { showToast('请输入规范词', 'warning'); return; }
            const theme = document.getElementById('editWordTheme').value;
            const note = document.getElementById('editWordNote').value.trim();

            item.from = from;
            item.to = to;
            item.theme = theme;
            item.note = note;
            item.title = to;
            item.updatedAt = Date.now();

            saveData();
            closeModal();
            showToast('✅ 规范词已更新');
            renderAll();
        }

        // ========== 删除（进回收站） ==========
        function deleteItem(id, type) {
            let item = null;
            let name = '';
            if (type === 'note') {
                item = appData.notes.find(n => n.id === id);
                name = item ? item.title : '笔记';
            } else if (type === 'error') {
                item = appData.errors.find(e => e.id === id);
                name = item ? item.title : '错题';
            } else if (type === 'word') {
                item = appData.words.find(w => w.id === id);
                name = item ? item.to : '规范词';
            }
            if (!item) return;

            if (!confirm(`确定要删除「${name}」吗？`)) return;

            appData.recycleBin.push({
                id: item.id,
                type: type,
                data: JSON.parse(JSON.stringify(item)),
                deletedAt: Date.now()
            });

            if (type === 'note') {
                appData.notes = appData.notes.filter(n => n.id !== id);
            } else if (type === 'error') {
                appData.errors = appData.errors.filter(e => e.id !== id);
            } else if (type === 'word') {
                appData.words = appData.words.filter(w => w.id !== id);
            }
            appData.starred = appData.starred.filter(s => s !== id);

            saveData();
            showToast(`✅ 「${name}」已移入回收站`);
            generateDailyReview();
            renderAll();
        }

        // ========== 回收站 ==========
        function showRecycleBin() {
            if (appData.recycleBin.length === 0) {
                showToast('回收站为空', 'info');
                return;
            }

            let html = `
                <div style="margin-bottom:12px;display:flex;justify-content:space-between;align-items:center;">
                    <span style="color:var(--gray-500);font-size:13px;">共 ${appData.recycleBin.length} 项</span>
                    <button class="btn-sm danger" onclick="emptyRecycleBin()">🗑️ 清空回收站</button>
                </div>
            `;

            for (const item of appData.recycleBin) {
                const typeMap = { note: '📝笔记', error: '❌错题', word: '📖规范词' };
                const name = item.data.title || item.data.to || '未命名';
                html += `
                    <div class="recycle-item">
                        <div class="info">
                            <span class="title">${escapeHtml(name)}</span>
                            <span class="type">${typeMap[item.type] || item.type}</span>
                            <span style="font-size:12px;color:var(--gray-400);margin-left:8px;">${formatDate(item.deletedAt)}</span>
                        </div>
                        <div class="actions">
                            <button class="restore" onclick="restoreFromRecycle('${item.id}')">↩️ 恢复</button>
                            <button class="permanent" onclick="permanentDelete('${item.id}')">🗑️ 彻底</button>
                        </div>
                    </div>
                `;
            }

            showModal('🗑️ 回收站', html, [
                { text: '关闭', class: '', action: 'close' }
            ]);
        }

        function restoreFromRecycle(id) {
            const idx = appData.recycleBin.findIndex(r => r.id === id);
            if (idx === -1) return;
            const item = appData.recycleBin[idx];
            if (item.type === 'note') {
                // 重新加入复习队列
                const note = item.data;
                note.nextReviewDate = new Date(Date.now() + 24 * 60 * 60 * 1000).toISOString();
                note.remembered = false;
                note.reviewCount = 0;
                appData.notes.push(note);
            } else if (item.type === 'error') {
                const error = item.data;
                error.nextReviewDate = new Date(Date.now() + 24 * 60 * 60 * 1000).toISOString();
                error.remembered = false;
                error.reviewCount = 0;
                appData.errors.push(error);
            } else if (item.type === 'word') {
                const word = item.data;
                word.nextReviewDate = new Date(Date.now() + 24 * 60 * 60 * 1000).toISOString();
                word.remembered = false;
                word.reviewCount = 0;
                appData.words.push(word);
            }
            appData.recycleBin.splice(idx, 1);
            saveData();
            showToast('✅ 已恢复，已重新加入复习队列');
            generateDailyReview();
            renderAll();
            showRecycleBin();
        }

        function permanentDelete(id) {
            if (!confirm('确定要彻底删除吗？不可恢复！')) return;
            const idx = appData.recycleBin.findIndex(r => r.id === id);
            if (idx === -1) return;
            appData.recycleBin.splice(idx, 1);
            saveData();
            showToast('已彻底删除');
            showRecycleBin();
            renderAll();
        }

        function emptyRecycleBin() {
            if (!confirm('确定要清空回收站吗？不可恢复！')) return;
            appData.recycleBin = [];
            saveData();
            showToast('回收站已清空');
            showRecycleBin();
            renderAll();
        }

        // ========== 星标 ==========
        function toggleStar(id, type) {
            const idx = appData.starred.indexOf(id);
            if (idx === -1) {
                appData.starred.push(id);
                showToast('⭐ 已星标');
            } else {
                appData.starred.splice(idx, 1);
                showToast('取消星标');
            }
            saveData();
            renderAll();
        }

        // ========== 置顶 ==========
        function togglePin(id, type) {
            let item = null;
            if (type === 'note') {
                item = appData.notes.find(n => n.id === id);
            } else if (type === 'error') {
                item = appData.errors.find(e => e.id === id);
            } else if (type === 'word') {
                item = appData.words.find(w => w.id === id);
            }
            if (!item) return;
            item.isPinned = !item.isPinned;
            saveData();
            renderAll();
        }

        // ========== 错题掌握 ==========
        function markMastered(id) {
            const item = appData.errors.find(e => e.id === id);
            if (!item) return;
            item.mastered = true;
            // 标记为记住
            item.remembered = true;
            saveData();
            showToast('✅ 已标记为掌握');
            renderAll();
        }

        function unmasterError(id) {
            const item = appData.errors.find(e => e.id === id);
            if (!item) return;
            item.mastered = false;
            item.remembered = false;
            const nextDate = new Date();
            nextDate.setDate(nextDate.getDate() + 1);
            item.nextReviewDate = nextDate.toISOString();
            saveData();
            showToast('↩️ 已重新纳入未掌握，明天复习');
            renderAll();
        }

        // ========== 批量操作 ==========
        function toggleBatchMode() {
            batchMode = !batchMode;
            batchSelected.clear();
            document.getElementById('btnBatchMode').textContent = batchMode ? '☑️ 取消' : '☑️ 批量';
            document.getElementById('batchActions').style.display = batchMode ? 'inline-flex' : 'none';
            renderCurrentView();
        }

        function toggleBatchSelect(id) {
            if (!batchMode) return;
            if (batchSelected.has(id)) {
                batchSelected.delete(id);
            } else {
                batchSelected.add(id);
            }
            document.querySelectorAll('.card').forEach(el => {
                if (el.dataset.id === id) {
                    el.style.border = batchSelected.has(id) ? '2px solid var(--primary)' : '';
                }
            });
        }

        function batchAddTag() {
            if (batchSelected.size === 0) { showToast('请先选择项目', 'warning'); return; }
            const tag = prompt('请输入要添加的标签：');
            if (!tag) return;
            const trimmed = tag.trim();
            if (!trimmed) return;
            let count = 0;
            for (const id of batchSelected) {
                const note = appData.notes.find(n => n.id === id);
                if (note) {
                    if (!note.tags) note.tags = [];
                    if (!note.tags.includes(trimmed)) { note.tags.push(trimmed);
                        count++; }
                }
                const error = appData.errors.find(e => e.id === id);
                if (error) {
                    if (!error.tags) error.tags = [];
                    if (!error.tags.includes(trimmed)) { error.tags.push(trimmed);
                        count++; }
                }
            }
            saveData();
            showToast(`✅ 为 ${count} 项添加了标签「${trimmed}」`);
            renderAll();
        }

        function batchRemoveTag() {
            if (batchSelected.size === 0) { showToast('请先选择项目', 'warning'); return; }
            const tag = prompt('请输入要移除的标签：');
            if (!tag) return;
            const trimmed = tag.trim();
            if (!trimmed) return;
            let count = 0;
            for (const id of batchSelected) {
                const note = appData.notes.find(n => n.id === id);
                if (note && note.tags) {
                    const idx = note.tags.indexOf(trimmed);
                    if (idx !== -1) { note.tags.splice(idx, 1);
                        count++; }
                }
                const error = appData.errors.find(e => e.id === id);
                if (error && error.tags) {
                    const idx = error.tags.indexOf(trimmed);
                    if (idx !== -1) { error.tags.splice(idx, 1);
                        count++; }
                }
            }
            saveData();
            showToast(`✅ 从 ${count} 项中移除了标签「${trimmed}」`);
            renderAll();
        }

        function batchAddQueue() {
            if (batchSelected.size === 0) { showToast('请先选择项目', 'warning'); return; }
            let count = 0;
            for (const id of batchSelected) {
                const note = appData.notes.find(n => n.id === id);
                if (note) {
                    note.remembered = false;
                    note.reviewCount = 0;
                    note.intervalIndex = 0;
                    note.nextReviewDate = new Date(Date.now() + 24 * 60 * 60 * 1000).toISOString();
                    count++;
                }
                const error = appData.errors.find(e => e.id === id);
                if (error) {
                    error.remembered = false;
                    error.reviewCount = 0;
                    error.intervalIndex = 0;
                    error.nextReviewDate = new Date(Date.now() + 24 * 60 * 60 * 1000).toISOString();
                    count++;
                }
                const word = appData.words.find(w => w.id === id);
                if (word) {
                    word.remembered = false;
                    word.reviewCount = 0;
                    word.intervalIndex = 0;
                    word.nextReviewDate = new Date(Date.now() + 24 * 60 * 60 * 1000).toISOString();
                    count++;
                }
            }
            saveData();
            showToast(`✅ ${count} 项已加入复习队列`);
            generateDailyReview();
            renderAll();
        }

        function batchDelete() {
            if (batchSelected.size === 0) { showToast('请先选择项目', 'warning'); return; }
            if (!confirm(`确定将选中的 ${batchSelected.size} 项移入回收站吗？`)) return;
            let count = 0;
            for (const id of batchSelected) {
                let item = appData.notes.find(n => n.id === id);
                let type = 'note';
                if (!item) {
                    item = appData.errors.find(e => e.id === id);
                    type = 'error';
                }
                if (!item) {
                    item = appData.words.find(w => w.id === id);
                    type = 'word';
                }
                if (item) {
                    appData.recycleBin.push({
                        id: item.id,
                        type: type,
                        data: JSON.parse(JSON.stringify(item)),
                        deletedAt: Date.now()
                    });
                    if (type === 'note') appData.notes = appData.notes.filter(n => n.id !== id);
                    else if (type === 'error') appData.errors = appData.errors.filter(e => e.id !== id);
                    else if (type === 'word') appData.words = appData.words.filter(w => w.id !== id);
                    appData.starred = appData.starred.filter(s => s !== id);
                    count++;
                }
            }
            saveData();
            batchSelected.clear();
            batchMode = false;
            document.getElementById('btnBatchMode').textContent = '☑️ 批量';
            document.getElementById('batchActions').style.display = 'none';
            showToast(`✅ ${count} 项已移入回收站`);
            generateDailyReview();
            renderAll();
        }

        // ========== 搜索 ==========
        function performSearch(query) {
            if (!query || query.length < 1) {
                renderCurrentView();
                return;
            }
            const q = query.toLowerCase().trim();
            const results = [];

            for (const note of appData.notes) {
                const match = note.title.toLowerCase().includes(q) ||
                    (note.content || '').toLowerCase().includes(q) ||
                    (note.tags || []).some(t => t.toLowerCase().includes(q));
                if (match) results.push({ ...note, _type: 'note' });
            }

            for (const error of appData.errors) {
                const match = (error.question || '').toLowerCase().includes(q) ||
                    (error.solution || '').toLowerCase().includes(q) ||
                    (error.reason || '').toLowerCase().includes(q) ||
                    (error.tags || []).some(t => t.toLowerCase().includes(q));
                if (match) results.push({ ...error, _type: 'error' });
            }

            for (const word of appData.words) {
                const match = (word.from || '').toLowerCase().includes(q) ||
                    (word.to || '').toLowerCase().includes(q) ||
                    (word.theme || '').toLowerCase().includes(q);
                if (match) results.push({ ...word, _type: 'word' });
            }

            const container = document.getElementById('contentList');
            if (results.length === 0) {
                container.innerHTML =
                    `<div class="empty-state"><div class="icon">🔍</div><p>未找到「${escapeHtml(query)}」相关内容</p></div>`;
                return;
            }

            let html = `<div style="margin-bottom:8px;font-size:13px;color:var(--gray-500);">🔍 找到 ${results.length} 条</div>`;
            for (const r of results) {
                if (r._type === 'note') html += renderNoteCard(r);
                else if (r._type === 'error') html += renderErrorCard(r);
                else if (r._type === 'word') html += renderWordCard(r);
            }
            container.innerHTML = html;
        }

        // ========== 导入导出 ==========
        function exportData() {
            const json = JSON.stringify(appData, null, 2);
            const blob = new Blob([json], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `公考备考数据_${new Date().toISOString().slice(0,10)}.json`;
            a.click();
            URL.revokeObjectURL(url);
            showToast('✅ 数据已导出');
        }

        function importData() {
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = '.json';
            input.onchange = function(e) {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = function(ev) {
                    try {
                        const data = JSON.parse(ev.target.result);
                        if (confirm('导入将覆盖当前所有数据，确认继续吗？')) {
                            appData = data;
                            saveData();
                            showToast('✅ 数据导入成功');
                            generateDailyReview();
                            renderAll();
                        }
                    } catch (err) {
                        showToast('❌ 导入失败：文件格式错误', 'error');
                    }
                };
                reader.readAsText(file);
            };
            input.click();
        }

        // ========== 弹窗管理 ==========
        function showModal(title, bodyHtml, footerBtns) {
            document.getElementById('modalTitle').textContent = title;
            document.getElementById('modalBody').innerHTML = bodyHtml;
            let footerHtml = '';
            for (const btn of footerBtns) {
                footerHtml +=
                    `<button class="btn ${btn.class}" onclick="${btn.action}()">${btn.text}</button>`;
            }
            document.getElementById('modalFooter').innerHTML = footerHtml;
            document.getElementById('modalOverlay').classList.remove('hidden');
        }

        function closeModal() {
            document.getElementById('modalOverlay').classList.add('hidden');
            editingId = null;
            editingType = null;
        }

        document.getElementById('modalOverlay').addEventListener('click', function(e) {
            if (e.target === this) closeModal();
        });

        // ========== 卡片点击批量选择 ==========
        document.addEventListener('click', function(e) {
            const card = e.target.closest('.card');
            if (card && batchMode) {
                const id = card.dataset.id;
                if (id) {
                    toggleBatchSelect(id);
                }
            }
        });

        // ========== 启动应用 ==========
        document.addEventListener('DOMContentLoaded', init);

        // 暴露全局函数
        window.selectNode = selectNode;
        window.toggleNode = toggleNode;
        window.expandAll = expandAll;
        window.collapseAll = collapseAll;
        window.handleNew = handleNew;
        window.showNewNoteModal = showNewNoteModal;
        window.showNewErrorModal = showNewErrorModal;
        window.showNewWordModal = showNewWordModal;
        window.saveNote = saveNote;
        window.saveError = saveError;
        window.saveWord = saveWord;
        window.updateNoteTemplateFields = updateNoteTemplateFields;
        window.updateEditNoteTemplateFields = updateEditNoteTemplateFields;
        window.editItem = editItem;
        window.saveEditNote = saveEditNote;
        window.saveEditError = saveEditError;
        window.saveEditWord = saveEditWord;
        window.deleteItem = deleteItem;
        window.showRecycleBin = showRecycleBin;
        window.restoreFromRecycle = restoreFromRecycle;
        window.permanentDelete = permanentDelete;
        window.emptyRecycleBin = emptyRecycleBin;
        window.toggleStar = toggleStar;
        window.togglePin = togglePin;
        window.markRemembered = markRemembered;
        window.markNotRemembered = markNotRemembered;
        window.markMastered = markMastered;
        window.unmasterError = unmasterError;
        window.toggleBatchMode = toggleBatchMode;
        window.toggleBatchSelect = toggleBatchSelect;
        window.batchAddTag = batchAddTag;
        window.batchRemoveTag = batchRemoveTag;
        window.batchAddQueue = batchAddQueue;
        window.batchDelete = batchDelete;
        window.exportData = exportData;
        window.importData = importData;
        window.closeModal = closeModal;
        window.renderCurrentView = renderCurrentView;
        window.renderAll = renderAll;
        window.showToast = showToast;
        window.toggleCardExpand = toggleCardExpand;
        window.generateDailyReview = generateDailyReview;
    </script>
</body>
</html>
